version: "3.8"

services:
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - jobportal-network

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - jobportal-network

  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=tiger
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - jobportal-network

  eureka-server:
    image: jobportal-eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - jobportal-network

  config-server:
    image: jobportal-config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - CONFIG_REPO_URI=https://github.com/Rahul-Gupta55/jobportal-config.git
      - CONFIG_REPO_LABEL=main
      - XDG_CONFIG_HOME=/tmp/jgit
    depends_on:
      - eureka-server
      - zipkin
    networks:
      - jobportal-network

  user-service:
    image: jobportal-user-service
    container_name: user-service
    environment:
      - CONFIG_SERVER_URI=http://config-server:8888
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
    depends_on:
      - config-server
      - mysql
      - rabbitmq
    networks:
      - jobportal-network

  job-service:
    image: jobportal-job-service
    container_name: job-service
    environment:
      - CONFIG_SERVER_URI=http://config-server:8888
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
    depends_on:
      - config-server
      - mysql
      - rabbitmq
    networks:
      - jobportal-network

  application-service:
    image: jobportal-application-service
    container_name: application-service
    environment:
      - CONFIG_SERVER_URI=http://config-server:8888
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
    depends_on:
      - config-server
      - mysql
      - rabbitmq
    networks:
      - jobportal-network

  resume-service:
    image: jobportal-resume-service
    container_name: resume-service
    environment:
      - CONFIG_SERVER_URI=http://config-server:8888
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
      - RESUME_UPLOAD_DIR=/data/resumes
    volumes:
      - resume-files:/data/resumes
    depends_on:
      - config-server
      - mysql
      - rabbitmq
    networks:
      - jobportal-network

  notification-service:
    image: jobportal-notification-service
    container_name: notification-service
    environment:
      - CONFIG_SERVER_URI=http://config-server:8888
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
    depends_on:
      - config-server
      - mysql
      - rabbitmq
    networks:
      - jobportal-network

  search-service:
    image: jobportal-search-service
    container_name: search-service
    environment:
      - CONFIG_SERVER_URI=http://config-server:8888
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
    depends_on:
      - config-server
      - mysql
      - rabbitmq
    networks:
      - jobportal-network

  api-gateway:
    image: jobportal-api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - CONFIG_SERVER_URI=http://config-server:8888
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - user-service
      - job-service
      - application-service
      - resume-service
      - notification-service
      - search-service
    networks:
      - jobportal-network


  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - jobportal-network

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      # These two volumes are critical; they let Promtail read Docker logs
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - jobportal-network
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - jobportal-network
    depends_on:
      - loki

volumes:
  mysql-data:
  resume-files:

networks:
  jobportal-network: