version: "3.8"

services:
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    networks:
      - jobportal-network
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9000"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  mysql-data:
  resume-files:
  sonarqube_data:      # Added
  sonarqube_extensions: # Added
  sonarqube_logs:       # Added

networks:
  jobportal-network: